<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Frete - GreenWay</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container">
    <span class="navbar-brand">🌿 GreenWay Store</span>
    <a href="index.html" class="btn btn-light btn-sm">Voltar</a>
  </div>
</nav>

<div class="container mt-5">

  <h2 class="text-center mb-4">Calcular Frete</h2>

  <div class="row justify-content-center">
    <div class="col-md-6">

      <input type="text" id="cep" class="form-control mb-2" placeholder="Digite seu CEP">

      <button onclick="buscarCEP()" class="btn btn-dark w-100">
        Buscar Endereço
      </button>

      <div id="endereco" class="mt-3"></div>

      <button onclick="calcularFrete()" class="btn btn-success w-100 mt-2">
        Calcular Frete
      </button>

      <p id="resultadoFrete" class="mt-3 text-center"></p>

    </div>
  </div>

</div>

<script src="frete.js"></script>
</body>
</html>
